<ion-header>
  <ion-toolbar class="custom-toolbar">
    <ion-title>
      <span class="brand">Tienda<span class="accent">King</span></span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="confirmLogout()" class="logout-btn">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <!-- HERO -->
  <div class="hero-section">
    <p class="hero-sub">{{ userEmail }}</p>
    <h2 class="hero-title">📸 Galería <span>King</span></h2>
  </div>

  <!-- BOTONES DE ACCIÓN -->
  <div class="action-section">
    <ion-button expand="block" class="btn-photo" (click)="addPhoto()" [disabled]="isLoading">
      <ion-icon name="camera-outline" slot="start"></ion-icon>
      Tomar Foto
    </ion-button>

    <!-- BOTÓN IR A TIENDA -->
    <ion-button expand="block" class="btn-productos" (click)="router.navigateByUrl('/productos')">
      <ion-icon name="storefront-outline" slot="start"></ion-icon>
      Ver Tienda
    </ion-button>
  </div>

  <!-- CONTADOR -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value">{{ photos.length }}</span>
      <span class="stat-label">Fotos</span>
    </div>
  </div>

  <div class="section-title">Catálogo</div>

  <!-- SPINNER MIENTRAS CARGA -->
  <div class="loading-photos" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Cargando fotos...</p>
  </div>

  <!-- VACÍO -->
  <div class="empty-state" *ngIf="!isLoading && photos.length === 0">
    <div class="empty-icon">📷</div>
    <p>Aún no hay fotos</p>
    <span>Toca el botón para agregar la primera</span>
  </div>

  <!-- GRID -->
  <ion-grid *ngIf="!isLoading && photos.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let photo of photos">
        <div class="photo-wrapper">
          <div class="photo-card">
            <ion-img [src]="photo.image"></ion-img>
          </div>
          <button class="delete-btn" (click)="confirmDelete(photo.id)">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
