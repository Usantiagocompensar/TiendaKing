<ion-header>
  <ion-toolbar class="custom-toolbar">
    <ion-title>
      <span class="brand">Tienda<span class="accent">King</span></span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" class="logout-btn">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <!-- HERO -->
  <div class="hero-section">
    <p class="hero-sub">Gestiona tu catálogo</p>
    <h2 class="hero-title">📸 Galería <span>King</span></h2>
  </div>

  <!-- BOTÓN TOMAR FOTO -->
  <div class="action-section">
    <ion-button expand="block" class="btn-photo" (click)="addPhoto()">
      <ion-icon name="camera-outline" slot="start"></ion-icon>
      Tomar Foto
    </ion-button>
  </div>

  <!-- CONTADOR -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value">{{ photos.length }}</span>
      <span class="stat-label">Fotos</span>
    </div>
  </div>

  <!-- GRID DE FOTOS -->
  <div class="section-title">Catálogo</div>

  <div class="empty-state" *ngIf="photos.length === 0">
    <div class="empty-icon">📷</div>
    <p>Aún no hay fotos</p>
    <span>Toca el botón para agregar la primera</span>
  </div>

  <ion-grid *ngIf="photos.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let photo of photos">
        <div class="photo-card">
          <ion-img [src]="photo"></ion-img>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
